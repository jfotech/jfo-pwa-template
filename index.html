<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zorana's Pizza Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0D0F12;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }

    /* JFO Install Button */
    #installButton {
      position: fixed;
      bottom: 55px; /* moved up so it doesn't overlap footer */
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 26px;
      background: #0d1b2a;
      color: #FF7A00;
      border: 2px solid #FF7A00;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transition: opacity 0.25s ease;
    }

    #installButton:active {
      transform: translateX(-50%) scale(0.97);
    }

    /* Modal styling */
    #installModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #0d1b2a;
      color: #FF7A00;
      border: 2px solid #FF7A00;
      border-radius: 10px;
      padding: 20px;
      width: 80%;
      max-width: 400px;
      z-index: 10000;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #installModal button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #FF7A00;
      color: #0d1b2a;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ⭐ JFO Footer (always visible, white text) */
    #jfoFooter {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #0d1b2a;
      color: #ffffff;
      text-align: center;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <iframe 
    src="https://datastudio.google.com/embed/reporting/6b2c667a-9e57-48b8-a542-22a6c3875e10/page/WvTvF"
    allowfullscreen
    sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
  </iframe>

  <button id="installButton">Install Dashboard</button>

  <div id="installModal">
    <p id="installMessage"></p>
    <button id="closeModal">Close</button>
  </div>

  <!-- ⭐ Always-visible JFO footer -->
  <div id="jfoFooter">Generated by JFO Technologies • Confidential Intelligence</div>

  <script>
    let deferredPrompt;
    const installButton = document.getElementById('installButton');
    const installModal = document.getElementById('installModal');
    const installMessage = document.getElementById('installMessage');
    const closeModal = document.getElementById('closeModal');

    // Detect platform
    const userAgent = navigator.userAgent.toLowerCase();
    const isIOS = /iphone|ipad|ipod/.test(userAgent);
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const isDuckDuckGo = userAgent.includes('duckduckgo');

    // ⭐ UNIVERSAL PWA DETECTION (Fix for iPhone Chrome)
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    // Hide button if already installed
    if (isStandalone) {
      installButton.style.display = 'none';
    }

    // Handle beforeinstallprompt (Android Chrome / Edge)
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) {
        installButton.style.display = 'block';
      }
    });

    // Universal click handler
    installButton.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') {
          installButton.style.display = 'none';
        }
        deferredPrompt = null;
      } else {
        // Fallback logic
        if (isDuckDuckGo) {
          installMessage.innerHTML = "Your browser doesn't support app installation.<br><br>Please open this page in Chrome or Safari.";
        } else if (isIOS && (isSafari || userAgent.includes('crios') || userAgent.includes('fxios'))) {
          installMessage.innerHTML = "To install this app:<br><br>1️⃣ Tap the <b>Share</b> icon<br>2️⃣ Tap <b>Add to Home Screen</b><br>3️⃣ Tap <b>Add</b>";
        } else {
          installMessage.innerHTML = "Your browser may not support automatic installation.<br><br>Try using Chrome or Edge for best results.";
        }
        installModal.style.display = 'block';
      }
    });

    closeModal.addEventListener('click', () => {
      installModal.style.display = 'none';
    });

    // Hide button after installation
    window.addEventListener('appinstalled', () => {
      installButton.style.display = 'none';
      deferredPrompt = null;
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>

</body>
</html>
